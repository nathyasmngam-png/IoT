<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQWMlGCgRPErnGQyEFZIKH2KRVbeN81_Q",
            authDomain: "computer-word-game-8b494.firebaseapp.com",
            projectId: "computer-word-game-8b494",
            storageBucket: "computer-word-game-8b494.firebasestorage.app",
            messagingSenderId: "187527876541",
            appId: "1:187527876541:web:e895ac46c2a08cce740cd4",
            measurementId: "G-M5VFY5PCKQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let myName = "";
        let currentRoomId = "";
        let roomState = {};
        let timerInterval = null;

        // 1. คลังคำศัพท์ไอทีคอมพิวเตอร์ภาษาไทยสําหรับตรวจสอบความถูกต้อง (สามารถเพิ่มคำเข้าไปได้อีก)
        const IT_DICTIONARY = [
            "คอมพิวเตอร์", "ระบบปฏิบัติการ", "อินเทอร์เน็ต", "เครือข่าย", "โปรแกรมเมอร์", 
            "ซอฟต์แวร์", "ฮาร์ดแวร์", "หน่วยความจำ", "แป้นพิมพ์", "เมาส์", "หน้าจอ", 
            "ข้อมูล", "สารสนเทศ", "รหัสผ่าน", "ความปลอดภัย", "ไวรัส", "ไฟร์วอลล์", 
            "คลาวด์", "เซิร์ฟเวอร์", "ฐานข้อมูล", "อัลกอริทึม", "แอปพลิเคชัน", "เว็บไซต์", 
            "บล็อกเชน", "ปัญญาประดิษฐ์", "หุ่นยนต์", "ดิจิทัล", "สมาร์ตโฟน", "เทคโนโลยี"
        ];

        const ladders = { 4: 14, 12: 22, 20: 38, 28: 40, 36: 46 };
        const snakes = { 15: 5, 27: 9, 35: 17, 43: 23, 49: 31 };

        function getLastThaiChar(word) {
            let cleanWord = word.replace(/[ะาิีึืุูေဲောํ์่้๊๋็]/g, '');
            return cleanWord.charAt(cleanWord.length - 1);
        }

        function getFirstThaiChar(word) {
            let cleanWord = word.replace(/^[เแโไใไ]/, '');
            return cleanWord.charAt(0);
        }

        function drawBoard(p1Pos, p2Pos) {
            const boardGrid = document.getElementById("board-grid");
            boardGrid.innerHTML = "";
            for (let row = 5; row >= 1; row--) {
                let rowCells = [];
                for (let col = 1; col <= 10; col++) {
                    let cellNum = (row - 1) * 10 + col;
                    if (row % 2 === 0) { cellNum = (row - 1) * 10 + (11 - col); }
                    rowCells.push(cellNum);
                }
                rowCells.forEach(num => {
                    let cellClass = "cell";
                    let label = num;
                    if (ladders[num]) { cellClass += " ladder"; label = `🪜 ${num}`; }
                    if (snakes[num]) { cellClass += " snake"; label = `🐍 ${num}`; }
                    let p1Html = (num === p1Pos) ? '<div class="piece p1"></div>' : '';
                    let p2Html = (num === p2Pos) ? '<div class="piece p2"></div>' : '';
                    boardGrid.innerHTML += `
                        <div class="${cellClass}" id="cell-${num}">
                            ${label}
                            <div class="pieces-container">${p1Html}${p2Html}</div>
                        </div>
                    `;
                });
            }
        }

        window.joinRoom = async () => {
            myName = document.getElementById("username").value.trim();
            currentRoomId = document.getElementById("room-input").value.trim().toUpperCase();

            if (!myName || !currentRoomId) {
                alert("กรอกข้อมูลให้ครบก่อนนะจ๊ะ");
                return;
            }

            const roomRef = doc(db, "rooms", currentRoomId);
            const roomSnap = await getDoc(roomRef);

            if (!roomSnap.exists()) {
                await setDoc(roomRef, {
                    roomCode: currentRoomId,
                    status: "waiting",
                    players: [myName],
                    currentWord: "คอมพิวเตอร์",
                    p1Pos: 1,
                    p2Pos: 1,
                    p1Skipped: false, // บันทึกสถานะโดนหยุดเล่นของ Player 1
                    p2Skipped: false, // บันทึกสถานะโดนหยุดเล่นของ Player 2
                    usedWords: ["คอมพิวเตอร์"], // เก็บคลังคำที่ถูกใช้ไปแล้วในแมตช์นี้
                    lastDice: 0,
                    timer: 20
                });
            } else {
                const data = roomSnap.data();
                if (data.players.includes(myName)) {
                } else if (data.players.length >= 2) {
                    alert("ห้องเต็มแล้วจ้า!");
                    return;
                } else {
                    let updatedPlayers = [...data.players, myName];
                    await setDoc(roomRef, { players: updatedPlayers }, { merge: true });

                    if (updatedPlayers.length === 2) {
                        await setDoc(roomRef, {
                            status: "playing",
                            player1: updatedPlayers[0],
                            player2: updatedPlayers[1],
                            currentTurn: updatedPlayers[0],
                            timer: 20
                        }, { merge: true });
                        startCountdownTrigger();
                    }
                }
            }

            document.getElementById("lobby-screen").classList.add("hidden");
            document.getElementById("waiting-screen").classList.remove("hidden");
            document.getElementById("display-room").innerText = currentRoomId;

            listenToRoom();
            listenToWords();
        };

        function listenToRoom() {
            onSnapshot(doc(db, "rooms", currentRoomId), async (snapshot) => {
                if (!snapshot.exists()) return;
                roomState = snapshot.data();

                document.getElementById("player-count").innerText = roomState.players.length;
                document.getElementById("player-list").innerHTML = roomState.players.map(p => `<div>👤 ${p}</div>`).join('');

                if (roomState.status !== "waiting") {
                    document.getElementById("waiting-screen").classList.add("hidden");
                    document.getElementById("game-screen").classList.remove("hidden");

                    document.getElementById("p1-label").innerText = `${roomState.player1} (ช่อง ${roomState.p1Pos}) ${roomState.p1Skipped ? '❌(โดนข้าม)' : ''}`;
                    document.getElementById("p2-label").innerText = `${roomState.player2} (ช่อง ${roomState.p2Pos}) ${roomState.p2Skipped ? '❌(โดนข้าม)' : ''}`;

                    drawBoard(roomState.p1Pos, roomState.p2Pos);

                    if (roomState.lastDice > 0) {
                        document.getElementById("dice-result").innerText = `🎲 ผลการทอยล่าสุดได้: ${roomState.lastDice} แต้ม!`;
                    } else if (roomState.lastDice === -1) {
                        document.getElementById("dice-result").innerText = `⚠️ ตอบผิดกติกา! ไม่ได้คะแนนและหยุดเล่นรอบถัดไป 1 ตา`;
                    }

                    let lastW = roomState.currentWord;
                    let lastC = getLastThaiChar(lastW);
                    document.getElementById("last-word").innerHTML = `${lastW} (คำต่อไปขึ้นด้วยตัว: <b style="color:#ef4444; font-size:24px;">${lastC}</b>)`;

                    document.getElementById("current-turn").innerText = roomState.currentTurn;
                    document.getElementById("timer").innerText = roomState.timer;

                    if (roomState.status === "finished") {
                        document.getElementById("dice-result").innerText = `🎉 เกมจบแล้ว!`;
                        document.getElementById("action-area").innerHTML = `<h2>🏆 ผู้ชนะคือคุณ ${roomState.finalWinner}!</h2>`;
                        clearInterval(timerInterval);
                        return;
                    }

                    // --- ระบบตรวจสอบคิวการเล่น (Skip Turn Check) ---
                    if (roomState.currentTurn === myName) {
                        let isP1 = (myName === roomState.player1);
                        let iAmSkipped = isP1 ? roomState.p1Skipped : roomState.p2Skipped;

                        // ถ้าเราติดสถานะโดนหยุดเล่น (Skip Turn) ให้ส่งสัญญาณข้ามตาตัวเองทันที
                        if (iAmSkipped) {
                            alert("👁️ รอบนี้คุณโดนหยุดเล่น 1 ตาเนื่องจากตอบผิดในรอบที่แล้ว ระบบจะข้ามไปตาเพื่อนทันที!");
                            let nextTurn = isP1 ? roomState.player2 : roomState.player1;
                            
                            let resetSkipData = {
                                currentTurn: nextTurn,
                                timer: 20,
                                lastDice: 0 // รีเซ็ตข้อความสถานะเต๋า
                            };
                            if (isP1) resetSkipData.p1Skipped = false;
                            else resetSkipData.p2Skipped = false;

                            await setDoc(doc(db, "rooms", currentRoomId), resetSkipData, { merge: true });
                            return;
                        }

                        document.getElementById("word-input").disabled = false;
                        document.getElementById("word-input").focus();
                    } else {
                        document.getElementById("word-input").disabled = true;
                    }
                }
            });
        }

        function listenToWords() {
            const q = query(collection(db, "rooms", currentRoomId, "words"), orderBy("time", "asc"));
            onSnapshot(q, (snapshot) => {
                let html = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    let diceText = data.dice > 0 ? `🎲 +${data.dice}` : `❌ ตอบผิด (งดทอย)`;
                    html += `<p style="margin:4px 0;"><b>${data.player}:</b> <span style="color:${data.dice > 0 ? '#10b981' : '#ef4444'};">${data.word}</span> (${diceText})</p>`;
                });
                const box = document.getElementById("word-history");
                box.innerHTML = html;
                box.scrollTop = box.scrollHeight;
            });
        }

        window.submitWord = async () => {
            let inputWord = document.getElementById("word-input").value.trim();
            if (!inputWord) return;

            let isP1 = (roomState.currentTurn === roomState.player1);
            let nextTurn = isP1 ? roomState.player2 : roomState.player1;

            let lastWord = roomState.currentWord;
            let lastChar = getLastThaiChar(lastWord);
            let firstChar = getFirstThaiChar(inputWord);

            // 2. ตรวจสอบกติกา: คำต้องขึ้นต้นถูกตัว, มีความหมาย (อยู่ในดิก), และยังไม่เคยถูกเล่น
            let isCorrectFormat = (lastChar === firstChar);
            let hasMeaning = IT_DICTIONARY.includes(inputWord);
            let isAlreadyUsed = roomState.usedWords ? roomState.usedWords.includes(inputWord) : false;

            if (!isCorrectFormat || !hasMeaning || isAlreadyUsed) {
                let reason = "";
                if (!isCorrectFormat) reason = `ตัวอักษรนำหน้าไม่ถูกต้อง (ต้องการ ${lastChar})`;
                else if (!hasMeaning) reason = `ไม่ใช่คำศัพท์ไอทีที่มีความหมายในระบบ`;
                else if (isAlreadyUsed) reason = `คำนี้ถูกใช้ไปแล้ว`;

                alert(`❌ ตอบผิดกติกา! (${reason})\nคุณจะไม่ได้รับแต้มเดินหมาก และจะถูกหยุดเล่นในรอบถัดไป 1 ตา!`);

                // อัปเดตสถานะตอบผิดลง Firestore (ติดโทษแบน และข้ามตาไปให้เพื่อน)
                let errorUpdateData = {
                    currentTurn: nextTurn,
                    lastDice: -1, // โค้ดแทนสถานะการตอบผิด
                    timer: 20
                };
                
                if (isP1) errorUpdateData.p1Skipped = true;
                else errorUpdateData.p2Skipped = true;

                // บันทึกประวัติคำที่ผิดลงไปในแชทด้วย (ใช้แต้มเต๋า 0 เพื่อบอกว่าไม่ได้คะแนน)
                await addDoc(collection(db, "rooms", currentRoomId, "words"), {
                    player: myName,
                    word: inputWord + ` (${reason})`,
                    dice: 0,
                    time: Date.now()
                });

                await setDoc(doc(db, "rooms", currentRoomId), errorUpdateData, { merge: true });
                document.getElementById("word-input").value = "";
                return;
            }

            // --- กรณีที่ตอบถูก (ความหมายมีจริงและตัวอักษรนำหน้าถูกต้อง) ---
            let diceRoll = Math.floor(Math.random() * 6) + 1;
            let currentPos = isP1 ? roomState.p1Pos : roomState.p2Pos;
            let nextPos = currentPos + diceRoll;

            if (nextPos > 50) nextPos = 50;

            let eventText = "";
            if (ladders[nextPos]) {
                nextPos = ladders[nextPos];
                eventText = " โชคดีเจอปีนบันไดวาร์ปขึ้น! 🪜";
            } else if (snakes[nextPos]) {
                nextPos = snakes[nextPos];
                eventText = " ว๊ายยโดนงูกัดสไลด์ร่วงลงมา! 🐍";
            }

            let gameFinished = (nextPos === 50);
            let updatedUsedWords = roomState.usedWords ? [...roomState.usedWords, inputWord] : [inputWord];

            await addDoc(collection(db, "rooms", currentRoomId, "words"), {
                player: myName,
                word: inputWord,
                dice: diceRoll,
                time: Date.now()
            });

            let updateData = {
                currentWord: inputWord,
                currentTurn: nextTurn,
                lastDice: diceRoll,
                usedWords: updatedUsedWords,
                timer: 20
            };

            if (isP1) updateData.p1Pos = nextPos;
            else updateData.p2Pos = nextPos;

            if (gameFinished) {
                updateData.status = "finished";
                updateData.finalWinner = myName;
            }

            await setDoc(doc(db, "rooms", currentRoomId), updateData, { merge: true });
            document.getElementById("word-input").value = "";

            if (eventText !== "") alert(`ผลเต๋าของคุณ: ได้ ${diceRoll} แต้ม! และ ${eventText}`);
        };

        function startCountdownTrigger() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(async () => {
                if (roomState.players && roomState.players[0] === myName && roomState.status === "playing") {
                    let newTimer = roomState.timer - 1;

                    if (newTimer <= 0) {
                        let loser = roomState.currentTurn;
                        let winner = (loser === roomState.player1) ? roomState.player2 : roomState.player1;

                        alert(`⏰ หมดเวลา!คุณ ${loser} ตอบไม่ทัน รอบนี้คุณ ${winner} ชนะทัวร์นาเมนต์ไปเลยจ้า!`);

                        await setDoc(doc(db, "rooms", currentRoomId), {
                            status: "finished",
                            finalWinner: winner
                        }, { merge: true });
                    } else {
                        await setDoc(doc(db, "rooms", currentRoomId), { timer: newTimer }, { merge: true });
                    }
                }
            }, 1000);
        }
    </script>
